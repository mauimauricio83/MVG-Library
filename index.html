<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Music Video Guy — Database</title>
<meta name="description" content="A reference database of music videos, directors, and artists — browsable by director, artist, or song.">
<meta property="og:title" content="MVG Library">
<meta property="og:description" content="A reference database of music videos, directors, and artists — browsable by director, artist, or song.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mauimauricio83.github.io/MVG-Library/">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <header class="app-header">
    <h1>The Music Video Guy Library</h1>
    <p class="subtitle">A reference database of music videos, directors, and artists. For corrections please email us at maui@themusicvideoguy.com</p>
    <p class="subtitle subtitle-stats" id="subtitleStats"></p>
    <a class="submit-link" href="https://forms.gle/8Tq1XXpPMHnSip5i6" target="_blank" rel="noopener noreferrer">Submit your music video here</a>
  </header>

  <div class="controls">
    <div class="tabs" role="tablist" aria-label="Browse by">
      <button class="tab active" data-view="director" role="tab" aria-selected="true">By Director</button>
      <button class="tab" data-view="artist" role="tab" aria-selected="false">By Artist</button>
      <button class="tab" data-view="song" role="tab" aria-selected="false">By Song Title</button>
    </div>
    <button type="button" id="tvModeBtn" class="tv-mode-btn">📺 TV Mode</button>
    <div class="search-wrap">
      <input type="search" id="search" placeholder="Search artist, song, or director…" aria-label="Search">
    </div>
  </div>

  <div class="filters-row">
    <div class="category-filters" id="categoryFilters"></div>
    <div class="filters-row-right">
      <label class="mvg-only-toggle">
        <input type="checkbox" id="mvgOnlyToggle">
        MVG Reels only
      </label>
      <select id="genreFilter" class="filter-select" aria-label="Filter by genre"></select>
      <select id="yearFilter" class="filter-select" aria-label="Filter by release year"></select>
    </div>
  </div>

  <div id="status" class="status"></div>
  <nav id="jumpNavTop" class="jumpnav" aria-label="Jump to letter"></nav>

  <div class="ad-placeholder">
    <a href="https://hisong.io/MUSICVIDEOGUY5" target="_blank" rel="noopener noreferrer">
      <img class="ad-image" src="https://images.squarespace-cdn.com/content/6280a1062dd56f7434ce1d85/205146cf-b9ae-4b31-874b-0bf0975d1b93/promocode.png?content-type=image%2Fpng" alt="Promo code — use code MUSICVIDEOGUY5">
    </a>
  </div>

  <section class="video-embed" id="videoEmbed">
    <div class="video-embed-box" id="videoEmbedBox">
      <div class="video-embed-hint">
        <p>Click 📺 TV Mode above to start a shuffled playlist.</p>
      </div>
    </div>
  </section>

  <main id="results" class="results"></main>
  <nav id="jumpNavBottom" class="jumpnav" aria-label="Jump to letter"></nav>
</div>

<div class="lightbox" id="lightbox" hidden>
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-panel" role="dialog" aria-modal="true" aria-label="Entry details">
    <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-content" id="lightboxContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>
</body>
</html>
