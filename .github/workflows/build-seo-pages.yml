name: Regenerate SEO hub pages

on:
  schedule:
    # 06:00 UTC daily — well after most sheet edits, before typical US-morning crawl traffic.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate director/artist hub pages
        run: node scripts/generate-seo-pages.js

      - name: Fetch latest blog posts
        run: node scripts/fetch-blog-latest.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add directors artists videos sitemap.xml blog-latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Regenerate SEO hub pages [automated]"
            git push
          fi
